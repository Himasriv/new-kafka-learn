spring.application.name=spring-batch-file-processor

spring.datasource.url=jdbc:h2:file:./data/batchdb;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false

spring.batch.jdbc.initialize-schema=always
spring.batch.jdbc.platform=h2
spring.batch.job.enabled=false

spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

app.input-directory=./input
app.scheduler.enabled=true
app.scheduler.cron=0 */5 * * * *
